<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💰 Faucet Revolution</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e, #16213e);
            color: white;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        h1 {
            text-align: center;
            font-size: 1.8em;
            background: linear-gradient(45deg, #f7931a, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            opacity: 0.5;
            font-size: 0.85em;
            margin-bottom: 20px;
        }
        .wallet-connect {
            background: linear-gradient(135deg, #9945FF, #14F195);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 6px 0;
            transition: all 0.3s;
        }
        .wallet-connect:hover { transform: scale(1.02); }
        .wallet-connect:active { transform: scale(0.98); }
        .wallet-connected {
            background: rgba(20, 241, 149, 0.15);
            border: 1px solid #14F195;
            border-radius: 16px;
            padding: 12px 16px;
            margin: 10px 0;
            font-size: 0.85em;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wallet-connected .address { color: #14F195; font-family: monospace; }
        .wallet-connected .disconnect { color: #ff6b6b; cursor: pointer; font-size: 1.2em; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 6px 0;
            border: none;
            border-radius: 14px;
            font-size: 16px;
        }
        input {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input::placeholder { color: rgba(255,255,255,0.4); }
        input:focus { outline: 2px solid #9945FF; }
        button {
            background: linear-gradient(45deg, #f7931a, #ff6b6b);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 14px;
        }
        button:hover { transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        button.secondary { background: linear-gradient(45deg, #4CAF50, #45a049); }
        button.withdraw { background: linear-gradient(45deg, #9945FF, #14F195); }
        .balance {
            font-size: 2.5em;
            text-align: center;
            color: #4CAF50;
            margin: 12px 0;
        }
        .balance-sub {
            text-align: center;
            font-size: 0.9em;
            opacity: 0.5;
            margin-bottom: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 12px 0;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }
        .stat .value { font-size: 1.2em; font-weight: bold; color: #ffd700; }
        .stat .label { font-size: 0.65em; opacity: 0.6; margin-top: 2px; }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            min-height: 44px;
            font-size: 0.9em;
        }
        .message.success { border-left: 4px solid #4CAF50; }
        .message.error { border-left: 4px solid #ff6b6b; }
        .message.info { border-left: 4px solid #9945FF; }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .grid-2 button { font-size: 13px; padding: 12px; }
        .currency-select {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin: 10px 0;
        }
        .currency-select button {
            padding: 10px;
            font-size: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
        }
        .currency-select button.active {
            background: linear-gradient(45deg, #f7931a, #ff6b6b);
            border-color: #f7931a;
        }
        .status-bar {
            text-align: center;
            font-size: 0.7em;
            opacity: 0.3;
            margin-top: 12px;
        }
        .badge {
            text-align: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            margin: 8px auto;
            display: inline-block;
            width: auto;
        }
        .badge-on { background: rgba(76,175,80,0.2); border: 1px solid #4CAF50; color: #4CAF50; }
        .badge-off { background: rgba(255,107,107,0.2); border: 1px solid #ff6b6b; color: #ff6b6b; }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #9945FF;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
            margin: 8px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Faucet Revolution</h1>
        <p class="subtitle">Gana crypto con Wallet Connect</p>
        
        <button class="wallet-connect" onclick="connectWallet()">
            🟣 Conectar Wallet
        </button>
        
        <div id="walletInfo" style="display:none;" class="wallet-connected">
            <span>🟢 <span class="address" id="walletAddress">Cargando...</span></span>
            <span class="disconnect" onclick="disconnectWallet()">✕</span>
        </div>
        
        <div id="statusBadge" class="badge badge-off" style="text-align:center;display:block;">⏳ Cargando...</div>
        
        <input id="wallet" placeholder="🔑 O ingresa tu dirección manualmente">
        <button class="secondary" onclick="register()">🚀 Registrar</button>
        
        <div class="balance" id="balance">$0.0000</div>
        <div class="balance-sub" id="balanceCrypto">🪙 0.0000 SOL</div>
        
        <div class="stats">
            <div class="stat">
                <div class="value" id="rate">0.00</div>
                <div class="label">USD/hora</div>
            </div>
            <div class="stat">
                <div class="value" id="streak">0</div>
                <div class="label">Racha 🔥</div>
            </div>
            <div class="stat">
                <div class="value" id="photos">0</div>
                <div class="label">Fotos 📸</div>
            </div>
        </div>
        
        <div class="grid-2">
            <button onclick="doAction('photo_upload')">📸 Subir</button>
            <button onclick="doAction('photo_download')">⬇️ Descargar</button>
            <button onclick="doAction('review')">⭐ Reseña</button>
            <button onclick="doAction('share')">🔄 Compartir</button>
        </div>
        
        <div style="text-align:center;font-size:0.75em;opacity:0.5;margin:10px 0;">Moneda para retirar:</div>
        <div class="currency-select">
            <button class="active" onclick="selectCurrency('SOL')">◎ SOL</button>
            <button onclick="selectCurrency('BTC')">₿ BTC</button>
            <button onclick="selectCurrency('ETH')">⟠ ETH</button>
            <button onclick="selectCurrency('USDC')">💵 USDC</button>
        </div>
        
        <button class="withdraw" onclick="withdraw()">💰 Retirar (mínimo $1)</button>
        
        <div id="loader" class="loader"></div>
        <div id="message" class="message">💡 Conecta tu wallet o regístrate</div>
        
        <div class="status-bar">🔄 Actualizado cada 3s | v3.0</div>
    </div>
    
    <script>
        const API_URL = window.location.origin;
        let publicKey = '';
        let selectedCurrency = 'SOL';
        
        // ========== WALLET CONNECT ==========
        function connectWallet() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            if (isMobile) {
                const wallets = [
                    { name: 'Phantom', url: 'https://phantom.app/ul/browse/' },
                    { name: 'Solflare', url: 'https://solflare.com/ul/' },
                    { name: 'Trust Wallet', url: 'https://link.trustwallet.com/' }
                ];
                
                let html = '📱 Elige tu wallet:<br><br>';
                wallets.forEach(w => {
                    html += `<button onclick="window.open('${w.url}${window.location.href}','_blank')" style="margin:4px;padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:white;cursor:pointer;font-size:14px;">
                        ${w.name}
                    </button>`;
                });
                html += `<br><br><span style="font-size:0.8em;opacity:0.5;">O ingresa tu dirección manualmente</span>`;
                showMessage(html, 'info');
                return;
            }
            
            if (window.solana && window.solana.isPhantom) {
                connectPhantom();
                return;
            }
            
            showMessage('🟣 Instala Phantom: https://phantom.app/', 'error');
            window.open('https://phantom.app/', '_blank');
        }
        
        async function connectPhantom() {
            try {
                if (!window.solana || !window.solana.isPhantom) {
                    showMessage('🟣 Instala Phantom', 'error');
                    return;
                }
                
                const response = await window.solana.connect();
                publicKey = response.publicKey.toString();
                
                document.getElementById('walletAddress').textContent = publicKey.slice(0, 6) + '...' + publicKey.slice(-4);
                document.getElementById('walletInfo').style.display = 'flex';
                document.getElementById('wallet').value = publicKey;
                localStorage.setItem('faucetWallet', publicKey);
                showMessage('✅ Wallet conectada', 'success');
                register();
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }
        
        function disconnectWallet() {
            publicKey = '';
            document.getElementById('walletInfo').style.display = 'none';
            localStorage.removeItem('faucetWallet');
            showMessage('👋 Wallet desconectada', 'info');
        }
        
        // ========== FUNCIONES ==========
        function selectCurrency(currency) {
            selectedCurrency = currency;
            document.querySelectorAll('.currency-select button').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(currency)) btn.classList.add('active');
            });
            updateStats();
        }
        
        async function register() {
            publicKey = document.getElementById('wallet').value.trim();
            if (!publicKey) return showMessage('Ingresa tu wallet', 'error');
            
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ publicKey })
                });
                const data = await res.json();
                showMessage(data.message, data.success ? 'success' : 'error');
                if (data.success) {
                    localStorage.setItem('faucetWallet', publicKey);
                    updateStats();
                    checkStatus();
                }
            } catch (e) {
                showMessage('❌ Error de conexión', 'error');
            }
        }
        
        async function doAction(action) {
            if (!publicKey) return showMessage('Regístrate primero', 'error');
            
            try {
                const res = await fetch(`${API_URL}/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ publicKey, action })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage(data.message, 'success');
                    updateStats();
                } else {
                    showMessage(data.message || 'Error', 'error');
                }
            } catch (e) {
                showMessage('❌ Error de conexión', 'error');
            }
        }
        
        async function withdraw() {
            if (!publicKey) return showMessage('Regístrate primero', 'error');
            
            try {
                const statsRes = await fetch(`${API_URL}/stats/${publicKey}`);
                const stats = await statsRes.json();
                
                if (stats.balance < 1.0) {
                    return showMessage(`❌ Necesitas $${(1.0 - stats.balance).toFixed(2)} más`, 'error');
                }
                
                showMessage('⏳ Procesando retiro...', 'info');
                document.getElementById('loader').style.display = 'block';
                
                const res = await fetch(`${API_URL}/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ publicKey, currency: selectedCurrency })
                });
                
                const data = await res.json();
                document.getElementById('loader').style.display = 'none';
                
                if (data.success) {
                    showMessage(data.message, 'success');
                    updateStats();
                } else {
                    showMessage(data.message || 'Error', 'error');
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                showMessage('❌ Error: ' + e.message, 'error');
            }
        }
        
        async function checkStatus() {
            try {
                const res = await fetch(`${API_URL}/ping`);
                const data = await res.json();
                const badge = document.getElementById('statusBadge');
                if (data.faucetEnabled) {
                    badge.className = 'badge badge-on';
                    badge.textContent = '✅ FaucetPay: ' + data.currency;
                } else {
                    badge.className = 'badge badge-off';
                    badge.textContent = '⚠️ Modo simulación';
                }
            } catch (e) {
                console.error('Error:', e);
            }
        }
        
        async function updateStats() {
            if (!publicKey) return;
            
            try {
                const res = await fetch(`${API_URL}/stats/${publicKey}`);
                if (!res.ok) return;
                const data = await res.json();
                
                document.getElementById('balance').textContent = `$${data.balance.toFixed(4)}`;
                
                const rates = { 'SOL': 0.007, 'BTC': 0.000015, 'ETH': 0.0004, 'USDC': 1.0 };
                const rate = rates[selectedCurrency] || 0.007;
                const cryptoAmount = data.balance * rate;
                document.getElementById('balanceCrypto').textContent = `🪙 ${cryptoAmount.toFixed(8)} ${selectedCurrency}`;
                
                document.getElementById('rate').textContent = data.estimatedHourly.toFixed(2);
                document.getElementById('streak').textContent = data.streak || 0;
                document.getElementById('photos').textContent = data.totalPhotos || 0;
            } catch (e) {
                console.error('Error:', e);
            }
        }
        
        function showMessage(text, type = 'info') {
            const msg = document.getElementById('message');
            msg.innerHTML = text;
            msg.className = `message ${type}`;
        }
        
        // ========== INICIALIZACIÓN ==========
        const savedWallet = localStorage.getItem('faucetWallet');
        if (savedWallet) {
            document.getElementById('wallet').value = savedWallet;
            publicKey = savedWallet;
            updateStats();
            checkStatus();
        }
        
        setInterval(updateStats, 3000);
    </script>
</body>
</html>
